<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Payment Success</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 400px;
      }

      .check {
        font-size: 60px;
        color: #28a745;
      }

      h1 {
        margin-top: 20px;
        font-size: 24px;
      }

      p {
        color: #666;
        margin: 10px 0 30px;
      }

      .btn {
        display: inline-block;
        padding: 12px 25px;
        background: black;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        transition: 0.3s;
      }

      .btn:hover {
        background: #333;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="check">✔</div>
      <h1>Payment Successful</h1>
      <p>Your payment has been processed successfully.</p>
      <p>Your consultation has been booked.</p>

      <a href="/" class="btn">Go to Home</a>
    </div>
  </body>
</html>
